name: "Check Telegram Mini App documentation updates"
on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
      - dev
      - release/*

jobs:
  check-telegram-webchanges:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run custom composite action
        uses: ./.github/actions/webchanges
        with:
          jobs: |
            name: Telegram Mini App documentation
            url: https://core.telegram.org/bots/webapps
            use_browser: false
          config: |
            report:
              tz: UTC
              github_issue:
                enabled: true
                owner: '${{ github.repository_owner }}'
                repo: '${{ github.event.repository.name }}'
                token: '${{ secrets.GITHUB_TOKEN }}'
                format_dt: '%Y-%m-%d'
                title: 'Telegram Mini App documentation update {dt}'
                format_content: |
                  ```text
                  {content}
                  ```