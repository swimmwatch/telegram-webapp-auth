name: "Check Telegram Mini App documentation updates"
on:
  workflow_dispatch:
  pull_request:
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read
  issues: write

jobs:
  check-telegram-docs-updates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check Telegram Mini App documentation updates
        uses: ./.github/actions/webchanges-action
        with:
          config: |
            display:
              error: false
            job_defaults:
              all:
                suppress_repeated_errors: true
              url:
                ignore_timeout_errors: true
                ignore_http_error_codes: "5xx"
            report:
              tz: UTC
              github_issue:
                enabled: true
                owner: "${{ github.repository_owner }}"
                repo: "${{ github.event.repository.name }}"
                token: "${{ secrets.GITHUB_TOKEN }}"
                format_dt: "%Y-%m-%d"
                title: "Telegram Mini App documentation update"
                assignees:
                  - "swimmwatch"
                format_content: |
                  ```diff
                  {content}
                  ```
          jobs: |
            name: Telegram Mini App documentation
            url: https://core.telegram.org/bots/webapps
            use_browser: false
            ignore_timeout_errors: true
            ignore_http_error_codes: "5xx"
            headers:
              User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/132.0.0.0 Safari/537.36
              Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8
              Accept-Language: en-US,en;q=0.9
            filters:
              - html2text
              - between:
                  start: "#### __WebAppInitData"
                  end: "#### __Events Available for Mini Apps"
